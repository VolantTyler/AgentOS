# Daily AI news — 07:00 America/New_York
#
# Runs /ai-news, then /evaluate-feature + /run-feature-tests
# for feature ai-news, via @cursor/sdk.
#
# Required repo secret: CURSOR_API_KEY

name: Daily AI news

on:
  schedule:
    - cron: "0 7 * * *"
      timezone: America/New_York
  workflow_dispatch:

concurrency:
  group: daily-ai-news
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily AI news
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run scheduled:daily-ai-news
