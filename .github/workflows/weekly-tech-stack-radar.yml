# Weekly tech-stack radar — Monday 11:00 America/New_York
#
# Runs /tech-stack-updates, then /evaluate-feature + /run-feature-tests
# for feature tech-stack-updates, via @cursor/sdk.
#
# Required repo secret: CURSOR_API_KEY (user or service account key from
# https://cursor.com/dashboard/integrations)

name: Weekly tech-stack radar

on:
  schedule:
    - cron: "0 11 * * 1"
      timezone: America/New_York
  workflow_dispatch:

concurrency:
  group: weekly-tech-stack-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run weekly tech-stack radar
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run scheduled:weekly-tech-stack
