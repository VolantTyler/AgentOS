# Auto-merge daily AI news digest PRs opened by the Cursor cloud agent.
#
# Matches head branches:
#   cursor/daily-ai-news-*
#   cursor/ai-news-daily-*
#
# Only merges when every changed file is under docs/research/ai-news-*.md.
# Draft PRs are marked ready, then merged (squash).
#
# Manual backlog sweep: Actions → Auto-merge AI news digest → Run workflow.

name: Auto-merge AI news digest

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "docs/research/ai-news-*.md"
  workflow_dispatch:
    inputs:
      sweep_open:
        description: Merge all eligible open digest PRs (backlog sweep)
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Merge triggered PR
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          case "$HEAD_REF" in
            cursor/daily-ai-news-*|cursor/ai-news-daily-*)
              ;;
            *)
              echo "Head branch '$HEAD_REF' is not a daily AI news digest branch; skipping."
              exit 0
              ;;
          esac

          mapfile -t files < <(
            gh pr view "$PR_NUMBER" --json files --jq '.files[].path'
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed files; skipping."
            exit 0
          fi

          for file in "${files[@]}"; do
            if [[ ! "$file" =~ ^docs/research/ai-news-[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$ ]]; then
              echo "Unexpected file in PR: $file"
              exit 0
            fi
          done

          if gh pr view "$PR_NUMBER" --json isDraft --jq '.isDraft' | grep -q true; then
            echo "Marking draft PR #$PR_NUMBER ready for review."
            gh pr ready "$PR_NUMBER"
          fi

          echo "Merging PR #$PR_NUMBER (squash)."
          gh pr merge "$PR_NUMBER" --squash --delete-branch

      - name: Sweep open digest PRs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.sweep_open == 'true'
        run: |
          set -euo pipefail

          mapfile -t prs < <(
            gh pr list \
              --repo "$GH_REPO" \
              --base main \
              --state open \
              --limit 100 \
              --json number,headRefName \
              --jq '.[] | select(
                (.headRefName | startswith("cursor/daily-ai-news-"))
                or (.headRefName | startswith("cursor/ai-news-daily-"))
              ) | .number'
          )

          if [ "${#prs[@]}" -eq 0 ]; then
            echo "No open digest PRs to merge."
            exit 0
          fi

          echo "Found ${#prs[@]} open digest PR(s): ${prs[*]}"

          for pr in "${prs[@]}"; do
            mapfile -t files < <(
              gh pr view "$pr" --repo "$GH_REPO" --json files --jq '.files[].path'
            )
            eligible=true
            for file in "${files[@]}"; do
              if [[ ! "$file" =~ ^docs/research/ai-news-[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$ ]]; then
                echo "PR #$pr skipped — unexpected file: $file"
                eligible=false
                break
              fi
            done
            if [ "$eligible" = false ] || [ "${#files[@]}" -eq 0 ]; then
              continue
            fi

            if gh pr view "$pr" --repo "$GH_REPO" --json isDraft --jq '.isDraft' | grep -q true; then
              gh pr ready "$pr" --repo "$GH_REPO"
            fi

            echo "Merging PR #$pr (squash)."
            gh pr merge "$pr" --repo "$GH_REPO" --squash --delete-branch || echo "PR #$pr could not be merged (conflict or checks); skipping."
          done
